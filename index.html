        "text": "现货比特币ETF规模持续扩大，4月已净流入16亿美元，成为机构配置数字资产的首选渠道，远超场外OTC交易量。"
      }
    ]
  }
};

</script>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function renderItems(containerId, items) {
  const el = document.getElementById(containerId);
  if (\!el) return;
  if (\!items || items.length === 0) {
    el.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  el.innerHTML = items.map(it => `
    <div class="news-item">
      <div class="news-source">${it.source || '未知来源'}</div>
      <div class="news-text">${it.text}</div>
    </div>
  `).join('');
}

function renderAll() {
  const d = REPORT_DATA;
  if (\!d || \!d.date) return;
  document.getElementById('hdr-date').textContent = d.date;
  document.getElementById('hdr-time').textContent = d.updatedAt;
  // AI
  if (d.ai) {
    renderItems('ai-bigtech', d.ai.bigtech);
    renderItems('ai-trends', d.ai.trends);
    renderItems('ai-tech', d.ai.tech);
    renderItems('ai-startup', d.ai.startup);
  }
  // Markets
  if (d.markets) {
    renderItems('mkt-overview', d.markets.overview);
    renderItems('mkt-macro', d.markets.macro);
    renderItems('mkt-policy', d.markets.policy);
    renderItems('mkt-institution', d.markets.institution);
    renderItems('mkt-stocks', d.markets.stocks);
    renderItems('mkt-commodity', d.markets.commodity);
    renderItems('mkt-other', d.markets.other);
  }
  // Crypto
  if (d.crypto) {
    renderItems('cry-market', d.crypto.market);
    renderItems('cry-news', d.crypto.news);
    renderItems('cry-onchain', d.crypto.onchain);
    renderItems('cry-funding', d.crypto.funding);
  }
}

renderAll();
</script>
</body>
</html>
