  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --accent-ai: #6c63ff;
      --accent-mkt: #22c55e;
      --accent-crypto: #f59e0b;
      --text: #e2e8f0;
      --muted: #8892a4;
      --tag-bg: #252836;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.6; }
    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    header h1 span { color: var(--accent-crypto); }
    .meta { color: var(--muted); font-size: 12px; }
    .tabs { display: flex; gap: 4px; padding: 16px 24px 0; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 57px; z-index: 99; }
    .tab { padding: 8px 20px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; font-weight: 600; border: 1px solid transparent; border-bottom: none; transition: all 0.2s; color: var(--muted); }
    .tab.active[data-tab="ai"] { background: var(--card); color: var(--accent-ai); border-color: var(--border); }
    .tab.active[data-tab="markets"] { background: var(--card); color: var(--accent-mkt); border-color: var(--border); }
    .tab.active[data-tab="crypto"] { background: var(--card); color: var(--accent-crypto); border-color: var(--border); }
    .tab:hover { color: var(--text); }
    .panel { display: none; padding: 24px; max-width: 1200px; margin: 0 auto; }
    .panel.active { display: block; }
    .section { margin-bottom: 28px; }
    .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-left: 10px; }
    .ai .section-title { color: var(--accent-ai); border-left: 3px solid var(--accent-ai); }
    .markets .section-title { color: var(--accent-mkt); border-left: 3px solid var(--accent-mkt); }
    .crypto .section-title { color: var(--accent-crypto); border-left: 3px solid var(--accent-crypto); }
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
    .news-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .news-source { font-size: 11px; color: var(--muted); background: var(--tag-bg); display: inline-block; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }
    .news-text { font-size: 13px; line-height: 1.65; color: var(--text); }
    .empty { color: var(--muted); font-style: italic; font-size: 13px; padding: 8px; }
    footer { text-align: center; padding: 32px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 40px; }
    @media (max-width: 600px) { .tabs { overflow-x: auto; } .panel { padding: 16px; } .news-grid { grid-template-columns: 1fr; } }
  </style>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

function renderItems(items) {
  if (\!items || items.length === 0) return '<p class="empty">暂无数据</p>';
  return '<div class="news-grid">' + items.map(item =>
    `<div class="news-item"><span class="news-source">${item.source || '—'}</span><p class="news-text">${item.text || ''}</p></div>`
  ).join('') + '</div>';
}

function render() {
  const D = REPORT_DATA;
  if (\!D || \!D.date) return;

  document.getElementById('meta-date').textContent = `📅 ${D.date}  🕐 ${D.updatedAt || '—'} 更新`;

  // AI panel
  const ai = D.ai || {};
  document.getElementById('panel-ai').innerHTML = `
    <div class="section"><div class="section-title">大厂动态</div>${renderItems(ai.bigtech)}</div>
    <div class="section"><div class="section-title">行业趋势</div>${renderItems(ai.trends)}</div>
    <div class="section"><div class="section-title">前沿技术</div>${renderItems(ai.tech)}</div>
    <div class="section"><div class="section-title">初创公司</div>${renderItems(ai.startup)}</div>
  `;

  // Markets panel
  const m = D.markets || {};
  document.getElementById('panel-markets').innerHTML = `
    <div class="section"><div class="section-title">全球市场概览</div>${renderItems(m.overview)}</div>
    <div class="section"><div class="section-title">宏观经济</div>${renderItems(m.macro)}</div>
    <div class="section"><div class="section-title">政策/政治动态</div>${renderItems(m.policy)}</div>
    <div class="section"><div class="section-title">投资机构动态</div>${renderItems(m.institution)}</div>
    <div class="section"><div class="section-title">个股异动</div>${renderItems(m.stocks)}</div>
    <div class="section"><div class="section-title">大宗商品</div>${renderItems(m.commodity)}</div>
    <div class="section"><div class="section-title">其他财经</div>${renderItems(m.other)}</div>
  `;

  // Crypto panel
  const c = D.crypto || {};
  document.getElementById('panel-crypto').innerHTML = `
    <div class="section"><div class="section-title">市场行情</div>${renderItems(c.market)}</div>
    <div class="section"><div class="section-title">重大新闻</div>${renderItems(c.news)}</div>
    <div class="section"><div class="section-title">链上与技术动态</div>${renderItems(c.onchain)}</div>
    <div class="section"><div class="section-title">融资与市场动态</div>${renderItems(c.funding)}</div>
  `;
}

render();
</script>
