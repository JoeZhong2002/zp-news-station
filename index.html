  header { padding: 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  header h1 { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  header .meta { color: var(--muted); font-size: 0.9rem; }
  nav { display: flex; gap: 0.5rem; padding: 1rem 2rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  nav button { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all .2s; }
  nav button.active, nav button:hover { color: #fff; border-color: var(--accent); background: #1e3a4f; }
  main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
  .section { display: none; }
  .section.active { display: block; }
  .section-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.5rem; }
  .section-header h2 { font-size: 1.3rem; font-weight: 700; }
  .ai-color { color: var(--ai); }
  .markets-color { color: var(--markets); }
  .crypto-color { color: var(--crypto); }
  .categories { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem; }
  .cat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; }
  .cat-card h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 0.8rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .news-item { margin-bottom: 0.8rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border); }
  .news-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .news-item .source { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.2rem; }
  .news-item .text { font-size: 0.88rem; line-height: 1.55; }
  footer { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 2rem; border-top: 1px solid var(--border); margin-top: 2rem; }
  .badge { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 10px; margin-left: 0.5rem; vertical-align: middle; }
  .badge-ai { background: #312e81; color: var(--ai); }

  .badge-crypto { background: #78350f; color: var(--crypto); }

<script>
const AI_LABELS = { bigtech: '大厂动态', trends: '行业趋势', tech: '前沿技术', startup: '初创动态' };
const MARKETS_LABELS = { overview: '全球概览', macro: '全球宏观', policy: '政策/政治', institution: '投资机构', stocks: '个股异动', commodity: '大宗商品', other: '其他财经' };
const CRYPTO_LABELS = { market: '市场行情', news: '重大新闻', onchain: '链上与技术', funding: '融资动态' };

function renderSection(data, labels, containerId) {
  const container = document.getElementById(containerId);
  if (\!data) return;
  container.innerHTML = Object.entries(labels).map(([key, label]) => {
    const items = data[key] || [];
    const itemsHtml = items.length
      ? items.map(i => `<div class="news-item"><div class="source">📰 ${i.source}</div><div class="text">${i.text}</div></div>`).join('')
      : '<div class="news-item"><div class="text" style="color:var(--muted)">暂无数据</div></div>';
    return `<div class="cat-card"><h3>${label}</h3>${itemsHtml}</div>`;
  }).join('');
}

function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  btn.classList.add('active');
}

function init() {
  if (\!REPORT_DATA || \!REPORT_DATA.date) {
    document.getElementById('header-date').textContent = '尚未生成日报';
    return;
  }
  document.getElementById('header-date').textContent = `📅 ${REPORT_DATA.date}  🕐 ${REPORT_DATA.updatedAt}`;
  document.getElementById('header-meta').textContent = '每日三合一日报 — AI 科技 · 资本市场 · Crypto';
  renderSection(REPORT_DATA.ai, AI_LABELS, 'ai-content');
  renderSection(REPORT_DATA.markets, MARKETS_LABELS, 'markets-content');
  renderSection(REPORT_DATA.crypto, CRYPTO_LABELS, 'crypto-content');
}

init();
</script>
