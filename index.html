<!DOCTYPE html>

<title>ZP News Station — 每日三合一日报</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3e;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --ai: #6366f1;
    --markets: #10b981;
    --crypto: #f59e0b;
    --tag-bg: rgba(99,102,241,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%); border-bottom: 1px solid var(--border); padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; }
  header h1 span { background: linear-gradient(90deg, #6366f1, #10b981, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .meta { color: var(--muted); font-size: 0.85rem; }
  .tabs { display: flex; gap: 4px; padding: 16px 32px 0; border-bottom: 1px solid var(--border); background: var(--card); }
  .tab { padding: 10px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--muted); border: 1px solid transparent; border-bottom: none; transition: all 0.2s; }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .tab.active { color: var(--text); background: var(--bg); border-color: var(--border); }
  .tab.ai.active { color: var(--ai); }
  .tab.markets.active { color: var(--markets); }
  .tab.crypto.active { color: var(--crypto); }
  .content { padding: 24px 32px; }
  .panel { display: none; }
  .panel.active { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .section-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .section-title.ai { color: var(--ai); }
  .section-title.markets { color: var(--markets); }
  .section-title.crypto { color: var(--crypto); }
  .news-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .news-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .news-source { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: var(--tag-bg); color: var(--muted); margin-bottom: 4px; }
  .news-text { font-size: 0.88rem; line-height: 1.6; color: var(--text); }
  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 24px; }
  @media (max-width: 600px) { .content { padding: 16px; } header { padding: 16px; } .tabs { padding: 12px 16px 0; } .panel.active { grid-template-columns: 1fr; } }
</style>
</head>

<script>
function renderItems(containerId, items) {
  const el = document.getElementById(containerId);
  if (!el || !items || items.length === 0) { if(el) el.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">暂无数据</p>'; return; }
  el.innerHTML = items.map(item => `
    <div class="news-item">
      <span class="news-source">${item.source}</span>
      <p class="news-text">${item.text}</p>
    </div>
  `).join('');
}

function init() {
  const d = REPORT_DATA;
  document.getElementById('header-meta').textContent = `每日三合一日报 · 更新于 ${d.updatedAt}`;
  document.getElementById('header-date').textContent = d.date;

  renderItems('ai-bigtech', d.ai.bigtech);
  renderItems('ai-trends', d.ai.trends);
  renderItems('ai-tech', d.ai.tech);
  renderItems('ai-startup', d.ai.startup);

  renderItems('markets-overview', d.markets.overview);
  renderItems('markets-macro', d.markets.macro);
  renderItems('markets-policy', d.markets.policy);
  renderItems('markets-institution', d.markets.institution);
  renderItems('markets-stocks', d.markets.stocks);
  renderItems('markets-commodity', d.markets.commodity);
  renderItems('markets-other', d.markets.other);

  renderItems('crypto-market', d.crypto.market);
  renderItems('crypto-news', d.crypto.news);
  renderItems('crypto-onchain', d.crypto.onchain);
  renderItems('crypto-funding', d.crypto.funding);
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab.${name}`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
}

init();
</script>
