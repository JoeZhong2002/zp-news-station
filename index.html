  .logo { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  .logo span { color: var(--accent-ai); }
  .meta { color: var(--muted); font-size: 13px; text-align: right; }
  .meta strong { color: var(--text); }
  
  nav { display: flex; gap: 4px; padding: 16px 32px; border-bottom: 1px solid var(--border); }
  nav button { padding: 8px 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  nav button.active, nav button:hover { color: var(--text); border-color: var(--accent-ai); background: rgba(99,102,241,0.1); }
  nav button[data-tab="markets"].active, nav button[data-tab="markets"]:hover { border-color: var(--accent-market); background: rgba(16,185,129,0.1); }
  nav button[data-tab="crypto"].active, nav button[data-tab="crypto"]:hover { border-color: var(--accent-crypto); background: rgba(245,158,11,0.1); }
  
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }
  
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  
  .section-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
  
  .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .section-card h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-card h3 .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ai { background: var(--accent-ai); }
  .dot-market { background: var(--accent-market); }
  .dot-crypto { background: var(--accent-crypto); }
  
  .news-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .news-item:last-child { border-bottom: none; padding-bottom: 0; }
  .news-item .source { font-size: 11px; color: var(--accent-ai); font-weight: 600; margin-bottom: 4px; }
  .news-item[data-cat="market"] .source, .news-item[data-cat="stocks"] .source,
  .news-item[data-cat="overview"] .source, .news-item[data-cat="macro"] .source,
  .news-item[data-cat="policy"] .source, .news-item[data-cat="institution"] .source,
  .news-item[data-cat="commodity"] .source, .news-item[data-cat="other"] .source { color: var(--accent-market); }
  .news-item[data-cat="crypto-market"] .source, .news-item[data-cat="news"] .source,
  .news-item[data-cat="onchain"] .source, .news-item[data-cat="funding"] .source { color: var(--accent-crypto); }
  .news-item p { color: var(--text); font-size: 13.5px; line-height: 1.55; }
  
  .summary-banner { background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(16,185,129,0.1)); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; display: flex; gap: 24px; flex-wrap: wrap; }
  .summary-item { flex: 1; min-width: 200px; }
  .summary-item .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .summary-item .value { font-size: 15px; font-weight: 600; line-height: 1.4; }

  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); }

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector(`nav button[data-tab="${tab}"]`).classList.add('active');
}

function renderSection(items, catKey, accentClass) {
  return items.map(item => `
    <div class="news-item" data-cat="${catKey}">
      <div class="source">${item.source}</div>
      <p>${item.text}</p>
    </div>
  `).join('');
}

function renderGrid(gridId, sections, dotClass) {
  const grid = document.getElementById(gridId);
  const labels = {
    bigtech: '大厂动态', trends: '行业趋势', tech: '前沿技术', startup: '初创动态',
    overview: '全球概览', macro: '宏观经济', policy: '政策/政治', institution: '机构动态',
    stocks: '个股异动', commodity: '大宗商品', other: '其他财经',
    market: '市场行情', news: '重大新闻', onchain: '链上动态', funding: '融资动态'
  };
  grid.innerHTML = Object.entries(sections).map(([key, items]) => `
    <div class="section-card">
      <h3><span class="dot ${dotClass}"></span>${labels[key] || key}</h3>
      ${renderSection(items, key, dotClass)}
    </div>
  `).join('');
}

function renderSummary(summaryId, items, color) {
  const el = document.getElementById(summaryId);
  el.innerHTML = items.map(i => `
    <div class="summary-item">
      <div class="label" style="color:${color}">${i.label}</div>
      <div class="value">${i.value}</div>
    </div>
  `).join('');
}
